<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reloj PWA</title>
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <div class="size-full flex-center bg-gradient">
        <div class="text-center">
            <div class="card">
                <div class="time-container">
                    <div class="time-box" id="hours">00</div>
                    <span class="separator">:</span>
                    <div class="time-box" id="minutes">00</div>
                    <span class="separator">:</span>
                    <div class="time-box" id="seconds">00</div>
                </div>
                <p class="date" id="date"></p>
                <p class="date">Pablo Vazquez Reyes</p>
                <button id="installBtn" class="install-btn">📱 Instalar Aplicación</button>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>

</html>
