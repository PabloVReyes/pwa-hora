<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reloj PWA</title>
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <div class="container">
        <div class="card">
            <div class="clock">
                <div class="time-segment" id="hours">00</div>
                <div class="separator">:</div>
                <div class="time-segment" id="minutes">00</div>
                <div class="separator">:</div>
                <div class="time-segment" id="seconds">00</div>
            </div>
            <p class="date" id="date">fecha</p>
            <p class="date">Pablo Vazquez Reyes</p>

            <!-- Botón de instalación para Android/Chrome -->
            <button id="installBtn" class="install-btn">📱 Instalar Aplicación</button>

            <!-- Mensaje para usuarios iOS -->
            <p id="iosHint" class="ios-hint">
                📱 Para instalar esta app en iOS: toca el botón de compartir y selecciona "Agregar a pantalla de
                inicio".
            </p>
        </div>
    </div>

    <script src="app.js"></script>
</body>

</html>
